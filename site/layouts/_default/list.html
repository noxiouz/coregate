{{ define "main" }}
  <section class="page-head">
    <p class="eyebrow">Documentation</p>
    <h1>{{ .Title }}</h1>
    {{ with .Params.summary }}<p class="lede">{{ . }}</p>{{ end }}
  </section>
  <section class="card-grid">
    {{ range .Pages.ByWeight }}
      <a class="card" href="{{ .RelPermalink }}">
        <h2>{{ .Title }}</h2>
        {{ with .Params.summary }}<p>{{ . }}</p>{{ end }}
      </a>
    {{ end }}
  </section>
{{ end }}
